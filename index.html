
<div id='chat-container' style='background: #1a1a1b; color: #d7dadc; font-family: sans-serif; height: 450px; display: flex; flex-direction: column; border-radius: 12px; border: 1px solid #343536;'>
    <div style='background: #272729; padding: 15px; border-bottom: 1px solid #343536; font-weight: bold; color: #ff4500;'>☳ SYNAPTIC OVERLORD - MULTI-SYNC ACTIVE</div>
    <div id='messages' style='flex: 1; overflow-y: auto; padding: 20px; font-size: 14px;'>
        <div style='margin-bottom: 15px;'><i>System: Neural bridge synchronized across notebooks. Ready for command.</i></div>
    </div>
    <div style='padding: 15px; background: #1a1a1b;'>
        <input id='user-input' type='text' style='width: 85%; background: #272729; border: 1px solid #343536; color: white; padding: 10px; border-radius: 20px; outline: none;' placeholder='Command the AI...'>
        <button onclick='sendMessage()' style='background: #ff4500; border: none; color: white; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold;'>➔</button>
    </div>
</div>
<script>
function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value; if (!text) return;
    document.getElementById("messages").innerHTML += `<div><b style='color:#0079d3;'>YOU:</b> ${text}</div>`;
    input.value = "";
    google.colab.kernel.invokeFunction("NotebookChat", [text], {});
}
window.setBotResponse = (r) => {
    const m = document.getElementById("messages");
    m.innerHTML += `<div style='margin-top:10px;'><b style='color:#ff4500;'>AI:</b> ${r}</div>`;
    m.scrollTop = m.scrollHeight;
};
</script>
